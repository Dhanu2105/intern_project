<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Sign In Page</title> 
    <style> 
        body  
        { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
            font-family: Arial, sans-serif; 
        } 
        .container  
        { 
            background-color: #ffffff; 
            padding: 30px; 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); 
            border-radius: 8px; 
            max-width: 400px; 
            width: 100%; 
        } 
        .container h2  
        { 
            margin-bottom: 20px; 
            color: #333; 
        } 
        .container .input-group  
        { 
            margin-bottom: 15px; 
        } 
        .container .input-group label  
        { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        } 
        .container .input-group input  
        { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        } 
        .container .button  
        { 
            background-color: #c2b011; 
            color: #ffffff; 
            padding: 10px 15px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
        } 
        .container .button:hover  
        { 
            background-color: #c5b528; 
        } 
        .container .forgot-password 
         { 
            display: block; 
            text-align: right; 
            margin-top: 10px; 
            color: #007bff; 
            text-decoration: none; 
        } 
        .container .forgot-password:hover 
         { 
            text-decoration: underline; 
        } 
    </style> 
    <script> 
        function register(){ 
         
            alert("You have sussefully loged in"); 
           let yWindow = window.close("sign in page.html", "sign in page.html", 
"width=600,height=600"); 
         
    } 
    </script> 
</head> 
<body> 
    <div class="container"> 
        <h2>Sign In</h2> 
        <form action="/submit_signin" method="POST"> 
            <div class="input-group"> 
                <label for="email">Email:</label> 
                <input type="email" id="email" name="email" required> 
            </div> 
            <div class="input-group"> 
                <label for="password">Password:</label> 
                <input type="password" id="password" name="password" required> 
            </div> 
            <button type="submit" class="button" onclick="register()">Log In</button> 
            <a href="#" class="forgot-password">Forgot Password?</a> 
        </form> 
    </div> 
</body> 
</html>
